name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chạy unit tests trên dữ liệu ảo (không cần GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # TODO 2.11.1: Chạy pytest trên thư mục tests/ với cờ -v
        run: pytest tests/ -v

  # JOB 2: Huấn luyện mô hình trên dữ liệu thực, upload artifact lên cloud storage
  train:
    name: Train
    needs: test              # Chỉ chạy khi job test qua
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2.11.2: Ghi nội dung secret CLOUD_CREDENTIALS ra file tạm
        #   và set biến môi trường xác thực tương ứng.
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "$CLOUD_CREDENTIALS" > sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 2.11.3: Dùng lệnh dvc pull để tải dữ liệu từ cloud storage
        run: dvc pull

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 2.11.4: Đọc giá trị "accuracy" từ file outputs/metrics.json
        run: |
          acc=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$acc" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 2.11.5: Sử dụng google-cloud-storage SDK để upload
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = os.environ["CLOUD_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiểm tra chất lượng - chỉ cho phép deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train             # Chỉ chạy khi job train qua
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        # TODO 2.11.6: Đọc giá trị accuracy từ output của job train.
        run: |
          python - <<'EOF'
          import os
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          print(f"Current accuracy: {accuracy}")
          if accuracy < threshold:
              print(f"Accuracy {accuracy} is below threshold {threshold}. Stopping pipeline.")
              sys.exit(1)
          print(f"Accuracy {accuracy} passed threshold {threshold}.")
          EOF

  # JOB 4: Triển khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval              # Chỉ chạy khi job eval qua
    runs-on: ubuntu-latest
    steps:
      - name: Restart service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 2.11.7: Restart service mlops-serve trên VM.
            sudo systemctl restart mlops-serve
            # TODO 2.11.8: Chờ server sẵn sàng và gọi curl /health để xác nhận.
            sleep 5
            curl -f http://localhost:8000/health || exit 1
